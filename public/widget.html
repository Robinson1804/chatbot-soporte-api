<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no,email=no,address=no" />
  <title>Mesa de Ayuda — OTIN | INEI</title>
  <link rel="icon" href="Bot-icon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="widget.css" />
</head>
<body class="widget-page">

  <!-- FAB — botón flotante que abre el chat -->
  <button class="widget-fab" id="widgetFab" title="Mesa de Ayuda OTIN" aria-label="Abrir asistente virtual">
    <img src="Bot-icon.png" alt="Asistente INEI" />
    <span class="widget-fab-dot" aria-hidden="true"></span>
  </button>

  <!-- Panel flotante -->
  <div class="widget-panel" id="widgetPanel" aria-hidden="true" role="dialog" aria-label="Asistente Mesa de Ayuda OTIN">

    <header class="chat-header">
      <div class="header-left">
        <div class="bot-avatar-header">
          <img src="Bot-icon.png" alt="Asistente INEI" class="bot-avatar-img" />
        </div>
        <div class="header-title">
          <span class="title-main">Mesa de Ayuda — OTIN</span>
          <span class="title-sub">Instituto Nacional de Estadística e Informática</span>
        </div>
      </div>
      <div class="header-right">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span class="status-text">En línea</span>
        </div>
        <button class="reset-btn" id="resetBtn" title="Reiniciar conversación" aria-label="Reiniciar conversación">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 .49-3.91"></path>
          </svg>
        </button>
        <button class="widget-close-btn" id="widgetClose" title="Cerrar" aria-label="Cerrar chat">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <main class="messages-area" id="messages" role="log" aria-live="polite" aria-label="Conversación">
    </main>

    <footer class="chat-footer">
      <div class="input-wrapper">
        <input
          type="text"
          id="userInput"
          class="message-input"
          placeholder="Escribe tu consulta..."
          autocomplete="off"
          aria-label="Escribe tu consulta"
          maxlength="2000"
        />
        <button class="send-btn" id="sendBtn" aria-label="Enviar mensaje">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="footer-note">Asistente virtual de la OTIN · Solo para trabajadores del INEI</p>
    </footer>

  </div>

  <script src="chat.js"></script>
  <script src="widget-toggle.js"></script>
</body>
</html>
